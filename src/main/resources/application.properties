spring.application.name=weatherpulse-api
server.port=${PORT:8080}

# Database configuration (H2 by default, production DB via env variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/weatherdb;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Local DB console (disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# OpenWeatherMap
openweather.api.key=${OPENWEATHER_API_KEY:}

# Frontend origin(s)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Scheduler defaults
weather.polling.fixed-rate-ms=${WEATHER_POLLING_FIXED_RATE_MS:300000}
weather.tracked-cities=${WEATHER_TRACKED_CITIES:Delhi,Mumbai,Chennai,Bangalore,Kolkata,Hyderabad}
weather.data-stale-minutes=${WEATHER_DATA_STALE_MINUTES:3}

